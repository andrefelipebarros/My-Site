[build]
  # Comando para construir o site usando pnpm
  command = "pnpm run build"
  # Pasta que o Netlify deve publicar (Padrão do Next.js no Netlify)
  publish = ".next"

# Garante que o Netlify use o plugin essencial para Next.js (SSR, API Routes, etc.)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# 1. Regra para a URL exata (SEM a barra no final) - Resolve o erro de Loop (ERR_TOO_MANY_REDIRECTS)
[[redirects]]
  from = "/sabiodiario"
  to = "https://sabiodiario.netlify.app/sabiodiario"
  status = 200
  force = true

# 2. Proxy reverso: exibe as subpáginas e arquivos do projeto "sabiodiario" mantendo a URL do domínio principal
[[redirects]]
  from = "/sabiodiario/*"
  to = "https://sabiodiario.netlify.app/sabiodiario/:splat"
  status = 200
  force = true
